services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    command: ["go", "run", "./cmd/api"]
    environment:
      APP_ENV: "development"
      SERVER_ADDR: ":8080"
      ADMIN_TOKEN: "dev-admin-token"
      POSTGRES_DSN: "postgres://postgres:postgres@postgres:5432/rate_limiter?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_DB: "0"
      REDIS_API_KEY_CACHE_TTL: "15m"
      KEY_HASH_PEPPER: "dev-key-pepper"
      CORS_ALLOWED_ORIGIN: "http://localhost:5173"
    ports:
      - "8080:8080"
    volumes:
      - ./:/app
      - go-mod-cache:/go/pkg/mod
    depends_on:
      - postgres
      - redis

  web:
    image: node:24-alpine
    working_dir: /app/web
    command: ["sh", "-c", "npm install && npm run dev"]
    environment:
      VITE_API_BASE_URL: "http://localhost:8080"
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - web-node-modules:/app/web/node_modules
    depends_on:
      - api

  migrate:
    image: migrate/migrate:v4.18.1
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://postgres:postgres@postgres:5432/rate_limiter?sslmode=disable",
        "up",
      ]
    volumes:
      - ./migrations:/migrations
    depends_on:
      - postgres

  sqlc:
    image: golang:1.23-alpine
    working_dir: /workspace
    command:
      [
        "go",
        "run",
        "github.com/sqlc-dev/sqlc/cmd/sqlc@v1.27.0",
        "generate",
      ]
    volumes:
      - ./:/workspace
      - go-mod-cache:/go/pkg/mod

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rate_limiter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - redis-data:/data

volumes:
  go-mod-cache:
  postgres-data:
  redis-data:
  web-node-modules:
